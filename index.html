<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sky: #4DC8D8; --navy: #1A3A6B; --navy-mid: #2D5A9E;
    --white: #fff; --light: #f0f8ff; --gray: #6b7280;
    --green-wa: #25D366; --radius: 12px; --shadow: 0 4px 20px rgba(26,58,107,.12);
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Nunito', sans-serif; background: var(--white); color: #1f2937; }

  /* ── TOP ANNOUNCEMENT BAR ── */
  .top-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 1001;
    height: 34px; background: var(--navy); overflow: hidden;
    display: flex; align-items: center; }
  .top-bar-track { display: flex; white-space: nowrap; animation: marquee 28s linear infinite; }
  .top-bar-track span { color: #fff; font-size: .78rem; font-weight: 700; letter-spacing: .04em;
    padding: 0 40px; flex-shrink: 0; }
  .top-bar-track span.sep { color: var(--sky); font-weight: 900; }
  @keyframes marquee {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ── NAVBAR ── */
  .nav { position: fixed; top: 34px; left: 0; right: 0; z-index: 1000;
    background: linear-gradient(135deg, rgba(26,58,107,.06) 0%, rgba(77,200,216,.1) 100%);
    backdrop-filter: blur(16px);
    border-bottom: 2px solid var(--sky);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5%; height: 68px; transition: box-shadow .3s; }
  .nav.scrolled { box-shadow: 0 2px 20px rgba(26,58,107,.15); }
  .nav-brand { display: flex; align-items: center; gap: 14px; text-decoration: none; }
  .nav-logo { height: 62px; width: auto; }
  .nav-name { font-size: 1.5rem; font-weight: 900; color: var(--sky); line-height: 1;
    letter-spacing: .02em; display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
    background: rgba(77,200,216,.12); padding: 8px 18px; border-radius: 12px; position: relative; }
  .nav-name span { color: var(--navy); font-size: .8rem; font-weight: 800; letter-spacing: .1em; }
  .bubble { position: absolute; border-radius: 50%; background: rgba(77,200,216,.35);
    pointer-events: none; animation: floatBubble 4s ease-in-out infinite; }
  .b1 { width: 10px; height: 10px; top: -6px; left: 10%; animation-delay: 0s; }
  .b2 { width: 6px; height: 6px; bottom: -4px; right: 20%; animation-delay: 1.5s; background: rgba(77,200,216,.5); }
  .b3 { width: 8px; height: 8px; top: 50%; right: -4px; animation-delay: 3s; }
  @keyframes floatBubble {
    0%, 100% { transform: translateY(0) scale(1); opacity: .6; }
    50% { transform: translateY(-8px) scale(1.15); opacity: 1; }
  }
  .nav-links { display: flex; align-items: center; gap: 8px; }
  .nav-link { color: var(--navy); text-decoration: none; font-weight: 700; font-size: .88rem;
    padding: 6px 14px; border-radius: 20px; transition: background .2s, color .2s; }
  .nav-link:hover { background: var(--light); color: var(--sky); }
  .nav-link-highlight { background: rgba(77,200,216,.15); border: 1px solid rgba(77,200,216,.3); }
  .nav-link-highlight:hover { background: var(--sky); color: #fff; }
  .nav-ig { display: flex; align-items: center; gap: 6px; padding: 7px 12px;
    border-radius: 20px; text-decoration: none; font-weight: 700; font-size: .85rem;
    background: linear-gradient(135deg,#f9d66f,#f48fb1,#ce93d8); color: #fff; transition: opacity .2s; }
  .nav-ig:hover { opacity: .88; }
  .nav-wa { display: flex; align-items: center; gap: 6px; padding: 7px 14px;
    border-radius: 20px; text-decoration: none; font-weight: 700; font-size: .85rem;
    background: var(--green-wa); color: #fff; transition: opacity .2s; }
  .nav-wa:hover { opacity: .88; }

  /* ── HERO CAROUSEL ── */
  /* ── STICKY SEARCH BAR ── */
  .nav-search { position: fixed; top: 102px; left: 0; right: 0; z-index: 999;
    background: linear-gradient(135deg, rgba(26,58,107,.04) 0%, rgba(77,200,216,.07) 100%);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(77,200,216,.25);
    padding: 8px 5%;
    display: flex; align-items: center; gap: 10px; }
  .nav-search .search-icon { font-size: 1rem; flex-shrink: 0; opacity: .5; cursor: pointer; }
  .nav-search .search-wrapper { flex: 1; position: relative; }
  .nav-search input { width: 100%; padding: 9px 36px 9px 16px; border: 2px solid rgba(77,200,216,.25);
    border-radius: 30px; font: inherit; font-size: .85rem; outline: none; background: rgba(255,255,255,.75);
    transition: border-color .25s, box-shadow .25s, background .25s; }
  .nav-search input:focus { border-color: var(--sky); box-shadow: 0 0 0 3px rgba(77,200,216,.15);
    background: #fff; }
  .nav-search .search-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: #bbb; cursor: pointer; font-size: 1rem; padding: 4px 6px;
    display: none; line-height: 1; }
  .nav-search.has-text .search-clear { display: block; }

  .hero { position: relative; height: 100vh; min-height: 600px; overflow: hidden; margin-top: 148px; }
